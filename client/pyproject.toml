[project]
name = "cc-sentiment"
version = "0.1.0"
description = "macOS CLI for Claude Code conversation sentiment analysis"
requires-python = ">=3.13.11"
dependencies = [
    "mlx-lm>=0.20",
    "click>=8.1",
    "httpx>=0.27",
    "pydantic>=2.7",
    "anyio>=4.4",
    "rich>=13.0",
    "tenacity>=8.0",
    "orjson>=3.10",
    "omlx[grammar] @ git+https://github.com/jundot/omlx.git",
]

[project.scripts]
cc-sentiment = "cc_sentiment.cli:main"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.metadata]
allow-direct-references = true

[tool.hatch.build.targets.wheel]
packages = ["cc_sentiment"]

[tool.pytest.ini_options]
testpaths = ["tests"]

[dependency-groups]
dev = [
    "pytest>=8.0",
    "pytest-anyio>=0.0.0",
]
