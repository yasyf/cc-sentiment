[project]
name = "cc-sentiment"
version = "0.1.0"
description = "Local Claude Code session scorer that contributes metrics to sentiments.cc"
readme = "README.md"
license = { text = "MIT" }
authors = [{ name = "Yasyf Mohamedali", email = "yasyfm@gmail.com" }]
keywords = ["claude-code", "sentiment", "mlx", "apple-silicon"]
classifiers = [
    "Development Status :: 3 - Alpha",
    "Intended Audience :: Developers",
    "License :: OSI Approved :: MIT License",
    "Operating System :: MacOS",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.13",
    "Topic :: Scientific/Engineering :: Artificial Intelligence",
    "Topic :: Software Development :: Libraries :: Python Modules",
]
requires-python = ">=3.13.11"
dependencies = [
    "mlx-lm>=0.20",
    "click>=8.1",
    "httpx>=0.27",
    "pydantic>=2.7",
    "anyio>=4.4",
    "rich>=13.0",
    "tenacity>=8.0",
    "orjson>=3.10",
    "textual>=3.0",
    "python-gnupg>=0.5.4",
]

[project.scripts]
cc-sentiment = "cc_sentiment.cli:main"

[project.urls]
Homepage = "https://sentiments.cc"
Repository = "https://github.com/yasyf/cc-sentiment"
Issues = "https://github.com/yasyf/cc-sentiment/issues"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["cc_sentiment"]

[tool.pytest.ini_options]
testpaths = ["tests"]
asyncio_mode = "auto"

[dependency-groups]
dev = [
    "pytest>=8.0",
    "pytest-anyio>=0.0.0",
    "pytest-asyncio>=1.3.0",
]
