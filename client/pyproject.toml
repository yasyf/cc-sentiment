[project]
name = "cc-sentiment"
version = "0.1.0"
description = "macOS CLI for Claude Code conversation sentiment analysis"
requires-python = ">=3.12"
dependencies = [
    "mlx-lm>=0.20",
    "click>=8.1",
    "httpx>=0.27",
    "pydantic>=2.7",
    "anyio>=4.4",
]

[project.scripts]
cc-sentiment = "client.cli:main"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["client"]

[tool.pytest.ini_options]
testpaths = ["tests"]

[dependency-groups]
dev = [
    "pytest>=8.0",
    "pytest-anyio>=0.0.0",
]
