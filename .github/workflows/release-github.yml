name: Release (GitHub)

on:
  push:
    branches: [main]
    paths:
      - client/**
      - .github/workflows/release-github.yml

concurrency:
  group: release-github
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Install uv
        uses: astral-sh/setup-uv@v8.0.0
        with:
          python-version: "3.13"
          cache-dependency-glob: client/uv.lock

      - name: Patch version
        env:
          VERSION: "0.1.${{ github.run_number }}"
        run: |
          uv run --no-project --with tomli-w python - <<'PY'
          import os, tomllib, tomli_w
          from pathlib import Path
          path = Path("client/pyproject.toml")
          data = tomllib.loads(path.read_text())
          data["project"]["version"] = os.environ["VERSION"]
          path.write_text(tomli_w.dumps(data))
          PY

      - name: Build
        working-directory: client
        run: uv build

      - name: Rename sdist to stable name
        env:
          VERSION: "0.1.${{ github.run_number }}"
        run: cp "client/dist/cc_sentiment-${VERSION}.tar.gz" client/dist/cc-sentiment.tar.gz

      - name: Create release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION: "0.1.${{ github.run_number }}"
        run: |
          gh release create "client-v${VERSION}" \
            --title "client v${VERSION}" \
            --target "${{ github.sha }}" \
            --generate-notes \
            --latest \
            client/dist/cc-sentiment.tar.gz \
            client/dist/cc_sentiment-${VERSION}-py3-none-any.whl
