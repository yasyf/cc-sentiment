name: Release (PyPI)

on:
  push:
    branches: [main]
    paths:
      - client/**
      - .github/workflows/release-pypi.yml

concurrency:
  group: release-pypi
  cancel-in-progress: false

permissions:
  contents: write

env:
  VERSION: 0.2.${{ github.run_number }}

jobs:
  build:
    name: Build pure-Python sdist + wheel
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6.0.2

      - name: Install uv
        uses: astral-sh/setup-uv@v8.1.0
        with:
          python-version: "3.13"
          cache-dependency-glob: client/uv.lock

      - name: Patch version
        run: |
          uv run --no-project --with tomli-w python - <<'PY'
          import os, tomllib, tomli_w
          from pathlib import Path
          path = Path("client/pyproject.toml")
          data = tomllib.loads(path.read_text())
          data["project"]["version"] = os.environ["VERSION"]
          path.write_text(tomli_w.dumps(data))
          PY

      - name: Bake Sentry DSN into package
        shell: bash
        env:
          SENTRY_DSN: ${{ secrets.SENTRY_DSN }}
        run: |
          if [ -n "$SENTRY_DSN" ]; then
            printf 'DSN = "%s"\n' "$SENTRY_DSN" > client/cc_sentiment/_sentry_dsn.py
          fi

      - name: Build sdist + wheel
        working-directory: client
        run: uv build

      - uses: actions/upload-artifact@v7.0.1
        with:
          name: dist
          path: client/dist/*
          if-no-files-found: error

  publish:
    needs: [build]
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@v8.0.1
        with:
          name: dist
          path: dist

      - uses: pypa/gh-action-pypi-publish@release/v1

  github_release:
    needs: [build]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v8.0.1
        with:
          name: dist
          path: dist

      - name: Create release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "v${VERSION}" \
            --title "v${VERSION}" \
            --target "${{ github.sha }}" \
            --generate-notes \
            --latest \
            --repo "${{ github.repository }}" \
            dist/*.whl dist/*.tar.gz
