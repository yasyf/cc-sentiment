name: Release (PyPI)

on:
  push:
    branches: [main]
    paths:
      - client/**
      - .github/workflows/release-pypi.yml

concurrency:
  group: release-pypi
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  set-version:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.v.outputs.version }}
    steps:
      - id: v
        run: echo "version=0.2.${{ github.run_number }}" >> "$GITHUB_OUTPUT"

  build_wheels:
    name: Build ${{ matrix.id }} wheel
    needs: set-version
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - id: macos-arm64
            os: macos-14
            cibw_archs: arm64
          - id: macos-x86_64
            os: macos-15-intel
            cibw_archs: x86_64
          - id: linux-x86_64
            os: ubuntu-latest
            cibw_archs: x86_64
          - id: linux-aarch64
            os: ubuntu-24.04-arm
            cibw_archs: aarch64
          - id: windows-amd64
            os: windows-latest
            cibw_archs: AMD64
    steps:
      - uses: actions/checkout@v6.0.2

      - name: Install uv
        uses: astral-sh/setup-uv@v8.1.0
        with:
          python-version: "3.13"

      - name: Patch version
        shell: bash
        env:
          VERSION: ${{ needs.set-version.outputs.version }}
        run: |
          uv run --no-project --with tomli-w python - <<'PY'
          import os, tomllib, tomli_w
          from pathlib import Path
          path = Path("client/pyproject.toml")
          data = tomllib.loads(path.read_text())
          data["project"]["version"] = os.environ["VERSION"]
          path.write_text(tomli_w.dumps(data))
          PY

      - name: Install Rust (non-Linux hosts)
        if: runner.os != 'Linux'
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build artifacts (host builds)
        if: runner.os != 'Linux'
        uses: Swatinem/rust-cache@v2.9.1
        with:
          workspaces: client -> target
          cache-on-failure: true
          shared-key: wheels-${{ matrix.id }}

      - name: Cache Rust build artifacts (Linux container)
        if: runner.os == 'Linux'
        uses: actions/cache@v4
        with:
          path: |
            client/.cargo/registry/index
            client/.cargo/registry/cache
            client/.cargo/git/db
            client/.cargo/bin
            client/target
          key: wheels-${{ matrix.id }}-${{ hashFiles('client/Cargo.lock', 'client/crates/**/Cargo.toml') }}
          restore-keys: |
            wheels-${{ matrix.id }}-

      - name: Build wheels
        uses: pypa/cibuildwheel@v3.4.1
        with:
          package-dir: client
          output-dir: wheelhouse
        env:
          CIBW_ARCHS: ${{ matrix.cibw_archs }}
          CIBW_ENVIRONMENT_LINUX: >-
            CARGO_HOME=/project/.cargo
            CARGO_TARGET_DIR=/project/target
            PATH=/project/.cargo/bin:$PATH

      - uses: actions/upload-artifact@v7.0.1
        with:
          name: cibw-wheels-${{ matrix.id }}
          path: ./wheelhouse/*.whl
          if-no-files-found: error

  build_sdist:
    name: Build sdist
    needs: set-version
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6.0.2

      - name: Install uv
        uses: astral-sh/setup-uv@v8.1.0
        with:
          python-version: "3.13"
          cache-dependency-glob: client/uv.lock

      - name: Patch version
        env:
          VERSION: ${{ needs.set-version.outputs.version }}
        run: |
          uv run --no-project --with tomli-w python - <<'PY'
          import os, tomllib, tomli_w
          from pathlib import Path
          path = Path("client/pyproject.toml")
          data = tomllib.loads(path.read_text())
          data["project"]["version"] = os.environ["VERSION"]
          path.write_text(tomli_w.dumps(data))
          PY

      - name: Build sdist
        working-directory: client
        run: uv build --sdist

      - uses: actions/upload-artifact@v7.0.1
        with:
          name: cibw-sdist
          path: client/dist/*.tar.gz
          if-no-files-found: error

  publish:
    needs: [build_wheels, build_sdist]
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@v8.0.1
        with:
          pattern: cibw-*
          path: dist
          merge-multiple: true

      - uses: pypa/gh-action-pypi-publish@release/v1

  github_release:
    needs: [set-version, build_wheels, build_sdist, publish]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v8.0.1
        with:
          pattern: cibw-*
          path: dist
          merge-multiple: true

      - name: Create release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION: ${{ needs.set-version.outputs.version }}
        run: |
          gh release create "v${VERSION}" \
            --title "v${VERSION}" \
            --target "${{ github.sha }}" \
            --generate-notes \
            --latest \
            --repo "${{ github.repository }}" \
            dist/*.whl dist/*.tar.gz
