name: Tests (client)

on:
  push:
    branches: [main]
    paths:
      - client/**
      - .github/workflows/tests-client.yml
  pull_request:
    paths:
      - client/**
      - .github/workflows/tests-client.yml

concurrency:
  group: tests-client-${{ github.ref }}
  cancel-in-progress: true

jobs:
  tests-rust:
    name: Tests (rust backend)
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v6.0.2

      - name: Install uv
        uses: astral-sh/setup-uv@v8.1.0
        with:
          python-version: "3.13"
          cache-dependency-glob: client/uv.lock

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build artifacts
        uses: Swatinem/rust-cache@v2.9.1
        with:
          workspaces: client -> target
          cache-on-failure: true
          shared-key: tests-client

      - name: Sync (rebuilds Rust ext in release mode via debug=false)
        working-directory: client
        run: uv sync

      - name: Run tests (rust backend)
        working-directory: client
        run: uv run pytest -n auto -q

      - name: Build wheel
        working-directory: client
        run: uv build --wheel

      - name: Smoke-test built wheel in fresh venv
        working-directory: client
        run: |
          rm -rf .wheel-smoke
          uv venv --seed .wheel-smoke
          uv pip install --python .wheel-smoke/bin/python dist/*.whl
          .wheel-smoke/bin/cc-sentiment --help

  tests-python:
    name: Tests (python fallback backend)
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v6.0.2

      - name: Install uv
        uses: astral-sh/setup-uv@v8.1.0
        with:
          python-version: "3.13"
          cache-dependency-glob: client/uv.lock

      - name: Sync (no Rust toolchain — setuptools-rust skips when cargo absent)
        working-directory: client
        run: uv sync

      - name: Run tests (python fallback backend)
        working-directory: client
        env:
          CC_SENTIMENT_DISABLE_RUST: "1"
        run: uv run pytest -n auto -q
