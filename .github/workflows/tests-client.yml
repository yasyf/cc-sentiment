name: Tests (client)

on:
  push:
    branches: [main]
    paths:
      - client/**
      - .github/workflows/tests-client.yml
  pull_request:
    paths:
      - client/**
      - .github/workflows/tests-client.yml

concurrency:
  group: tests-client-${{ github.ref }}
  cancel-in-progress: true

jobs:
  tests:
    name: Tests
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v7

      - name: Install uv
        uses: astral-sh/setup-uv@v8.2.0
        with:
          python-version: "3.13"
          cache-dependency-glob: client/uv.lock

      - name: Sync (cc-transcript ships a prebuilt abi3 wheel — no toolchain)
        working-directory: client
        run: uv sync

      - name: Run tests
        working-directory: client
        run: uv run pytest -n auto -q

      - name: Build wheel
        working-directory: client
        run: uv build --wheel

      - name: Smoke-test built wheel in fresh venv
        working-directory: client
        run: |
          rm -rf .wheel-smoke
          uv venv --seed .wheel-smoke
          uv pip install --python .wheel-smoke/bin/python dist/*.whl
          .wheel-smoke/bin/cc-sentiment --help
