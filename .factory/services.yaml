commands:
  install: cd client && uv sync
  test: cd client && uv run pytest -xvs
  test-fast: cd client && uv run pytest -x --timeout=30
  test-tui: cd client && uv run pytest tests/test_tui.py tests/test_setup_flow.py -xvs
  setup-dry: cd client && uv run cc-sentiment setup
  lint: cd client && uv run --with ruff ruff check cc_sentiment/tui tests
services: {}
